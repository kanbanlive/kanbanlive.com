version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dependencies:
        patterns:
          - "*"
    ignore:
      # TypeScript 7+ is incompatible with @astrojs/check (peer: ^5 || ^6).
      # Remove once the Astro tooling adds TS 7 support.
      - dependency-name: "typescript"
        versions: ["7.x"]
